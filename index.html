<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>चित्त विजय — Bibek Patra</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --parchment: #f7edd8;
  --parchment-mid: #eedd99; /* yellowed */
  --parchment-dark: #e8d5b0;
  --ink: #2c1a0e;
  --ink-light: #5a3e28;
  --gold: #b8860b;
  --gold-light: #d4a841;
  --gold-glow: #f0c060;
  --crimson: #7a1515;
  --bg: #0e0702;
}

*{margin:0;padding:0;box-sizing:border-box;}

body {
  background: var(--bg);
  font-family: 'Tiro Devanagari Hindi', Georgia, serif;
  overflow-x: hidden;
}

/* ─── LANDING SCENE ─────────────────────────── */
#landing {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 60%, #1e0e04 0%, #0a0401 100%);
  z-index: 100;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#landing.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

/* Stars */
.stars-bg { position: absolute; inset: 0; overflow: hidden; }
.star-dot {
  position: absolute; border-radius: 50%;
  background: #f0c060;
  animation: twinkle var(--d) ease-in-out infinite;
}
@keyframes twinkle {
  0%,100%{opacity:var(--oa);transform:scale(1);}
  50%{opacity:0.05;transform:scale(0.3);}
}

/* Ambient glow under book */
.book-glow {
  position: absolute;
  width: 340px; height: 80px;
  background: radial-gradient(ellipse, rgba(184,134,11,0.35) 0%, transparent 70%);
  bottom: 30%;
  left: 50%; transform: translateX(-50%);
  filter: blur(20px);
  pointer-events: none;
  animation: glowBreath 3s ease-in-out infinite;
}
@keyframes glowBreath {
  0%,100%{opacity:0.7;} 50%{opacity:1;}
}

/* ─── 3D BOOK ────────────────────────────────── */
.book-scene {
  perspective: 1200px;
  cursor: pointer;
  margin-bottom: 30px;
  position: relative;
  z-index: 2;
}
.book-scene:hover .book-3d { transform: rotateY(-18deg) rotateX(5deg) translateY(-6px); }
.book-3d {
  width: 220px; height: 300px;
  position: relative;
  transform-style: preserve-3d;
  transform: rotateY(-12deg) rotateX(3deg);
  transition: transform 0.4s ease;
}

/* FRONT COVER */
.book-front {
  position: absolute; inset: 0;
  background: linear-gradient(150deg, #1a0803 0%, #2d1205 15%, #1a0803 40%, #321405 70%, #1a0803 100%);
  backface-visibility: hidden;
  border-radius: 2px 6px 6px 2px;
  box-shadow: 2px 0 8px rgba(0,0,0,0.5);
  overflow: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px 16px;
  text-align: center;
}
.book-front::before {
  content:'';position:absolute;inset:10px;
  border:1px solid rgba(184,134,11,0.3);border-radius:2px;pointer-events:none;
}
.book-front::after {
  content:'';position:absolute;inset:16px;
  border:1px solid rgba(184,134,11,0.12);border-radius:1px;pointer-events:none;
}
.bf-om { font-size:1.8rem; margin-bottom:10px; filter:drop-shadow(0 0 12px rgba(184,134,11,0.9));}
.bf-title { font-family:'Tiro Devanagari Hindi',serif; font-size:1.5rem; color:#d4a841; line-height:1.3; text-shadow:0 0 20px rgba(184,134,11,0.6); margin-bottom:8px; }
.bf-line { width:60px; height:1px; background:linear-gradient(90deg,transparent,#b8860b,transparent); margin:8px auto; }
.bf-sub { font-size:0.55rem; color:rgba(212,168,65,0.7); letter-spacing:2px; line-height:1.6; }
.bf-author { font-family:'Cinzel',serif; font-size:0.55rem; color:rgba(212,168,65,0.8); letter-spacing:3px; margin-top:12px; }

/* SPINE */
.book-spine-3d {
  position: absolute;
  width: 28px; height: 100%;
  left: -28px; top: 0;
  transform-origin: right;
  transform: rotateY(90deg);
  background: linear-gradient(90deg,#0a0401,#3d1a06,#5a2a0a,#3d1a06,#0a0401);
  display: flex; align-items: center; justify-content: center;
  box-shadow: -4px 0 15px rgba(0,0,0,0.7);
}
.spine-txt {
  writing-mode: vertical-rl; transform: rotate(180deg);
  font-family:'Tiro Devanagari Hindi',serif; font-size:0.55rem;
  color:rgba(184,134,11,0.6); letter-spacing:3px;
}

/* BACK */
.book-back {
  position: absolute; inset: 0;
  background: #120601;
  border-radius: 2px 6px 6px 2px;
  transform: rotateY(180deg);
  backface-visibility: hidden;
}

/* PAGES STACK (edge) */
.book-pages-edge {
  position: absolute;
  width: 12px; height: 296px;
  right: -10px; top: 2px;
  background: repeating-linear-gradient(
    0deg,
    #f5e8c8 0px, #f5e8c8 1px,
    #e8d5b0 1px, #e8d5b0 2px
  );
  transform: rotateY(-90deg) translateX(6px);
  transform-origin: left;
}

/* Click hint */
.click-hint {
  position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%);
  text-align: center; color: rgba(184,134,11,0.5);
  font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:3px;
  animation: hintPulse 2s ease-in-out infinite;
  white-space: nowrap;
}
@keyframes hintPulse {
  0%,100%{opacity:0.4;} 50%{opacity:0.9;}
}

.landing-subtitle {
  font-family:'Tiro Devanagari Hindi',serif;
  color:rgba(184,134,11,0.6);
  font-size:0.85rem; letter-spacing:2px;
  margin-top:20px; text-align:center;
  z-index:2;
}

/* ─── OPEN ANIMATION ─────────────────────────── */
#landing.opening .book-3d {
  animation: bookOpen 1.2s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes bookOpen {
  0%   { transform: rotateY(-12deg) rotateX(3deg) scale(1); opacity:1; }
  40%  { transform: rotateY(-55deg) rotateX(8deg) scale(1.08); opacity:1; }
  70%  { transform: rotateY(5deg) rotateX(2deg) scale(1.15); opacity:1; }
  100% { transform: rotateY(0deg) rotateX(0deg) scale(4); opacity:0; }
}
#landing.opening .book-glow {
  animation: glowExpand 1.2s ease forwards;
}
@keyframes glowExpand {
  100%{ width:100vw; height:100vh; opacity:0; }
}

/* ─── READER ─────────────────────────────────── */
#reader {
  display: none;
  background: #12080300;
}
#reader.visible { display: block; }

/* Sticky top bar */
.reader-topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(14,7,2,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(184,134,11,0.2);
  display: flex; align-items: center;
  padding: 10px 24px; gap: 16px;
}
.topbar-title {
  font-family:'Tiro Devanagari Hindi',serif;
  color: var(--gold-light); font-size:0.95rem; letter-spacing:1px; flex:1;
}
.topbar-progress-wrap {
  flex: 2; height: 3px; background: rgba(184,134,11,0.15); border-radius:2px; overflow:hidden;
}
.topbar-progress { height:100%; background:linear-gradient(90deg,var(--crimson),var(--gold)); width:0; transition:width 0.3s; border-radius:2px; }
.topbar-pct { font-family:'Cinzel',serif; font-size:0.65rem; color:rgba(184,134,11,0.6); letter-spacing:2px; min-width:40px; text-align:right; }

/* ─── SCROLLABLE BOOK CONTENT ────────────────── */
#book-content {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 20px 100px;
}

/* Each "page" is a section */
.page-section {
  position: relative;
  margin: 48px 0;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.page-section.visible {
  opacity: 1; transform: translateY(0);
}

/* Parchment card */
.parchment-card {
  background:
    radial-gradient(ellipse at 5% 5%, rgba(255,248,220,0.6) 0%, transparent 40%),
    radial-gradient(ellipse at 95% 95%, rgba(200,160,100,0.3) 0%, transparent 40%),
    linear-gradient(160deg, #f9f0da 0%, #f3e5c0 40%, #eddcb0 100%);
  border-radius: 2px 8px 8px 2px;
  box-shadow:
    -8px 0 0 #c8a060,
    -12px 4px 20px rgba(0,0,0,0.5),
    8px 4px 30px rgba(0,0,0,0.3),
    inset -3px 0 8px rgba(100,60,20,0.1),
    inset 3px 0 4px rgba(255,255,255,0.4);
  border-left: 6px solid #b8924a;
  position: relative;
  overflow: hidden;
}
/* Ruled lines texture */
.parchment-card::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 29px,
    rgba(160,120,60,0.07) 29px, rgba(160,120,60,0.07) 30px
  );
}
/* Paper edge fold */
.parchment-card::after {
  content:''; position:absolute; top:0; right:0;
  width:0; height:0;
  border-style:solid;
  border-width:0 28px 28px 0;
  border-color:transparent rgba(180,140,70,0.25) transparent transparent;
}

.card-inner { padding: 52px 62px 60px; position:relative; }

/* ─── COVER PAGE SECTION ─────────────────────── */
.cover-section .parchment-card {
  background: linear-gradient(150deg, #1a0803 0%, #2d1205 20%, #1a0803 50%, #2d1205 80%, #1a0803 100%);
  border-left: 6px solid #5a3010;
  box-shadow: -8px 0 0 #3a1a05, -12px 4px 30px rgba(0,0,0,0.8), 8px 4px 40px rgba(0,0,0,0.5);
}
.cover-section .parchment-card::before {
  background:
    repeating-linear-gradient(45deg,transparent,transparent 50px,rgba(184,134,11,0.02) 50px,rgba(184,134,11,0.02) 51px),
    repeating-linear-gradient(-45deg,transparent,transparent 50px,rgba(184,134,11,0.02) 50px,rgba(184,134,11,0.02) 51px);
}
.cover-section .parchment-card::after { display:none; }

.cover-inner {
  padding: 80px 60px;
  text-align: center;
  display: flex; flex-direction:column; align-items:center;
  position: relative;
}
.c-border { position:absolute; inset:18px; border:1px solid rgba(184,134,11,0.3); border-radius:3px; pointer-events:none; }
.c-border::before { content:''; position:absolute; inset:8px; border:1px solid rgba(184,134,11,0.12); border-radius:2px; }
.c-corner { position:absolute; width:24px; height:24px; border-color:var(--gold); border-style:solid; opacity:0.5; }
.c-corner.tl{top:26px;left:26px;border-width:2px 0 0 2px;}
.c-corner.tr{top:26px;right:26px;border-width:2px 2px 0 0;}
.c-corner.bl{bottom:26px;left:26px;border-width:0 0 2px 2px;}
.c-corner.br{bottom:26px;right:26px;border-width:0 2px 2px 0;}

.c-om { font-size:3rem; margin-bottom:24px; filter:drop-shadow(0 0 24px rgba(184,134,11,0.9)); animation:omGlow 3s ease-in-out infinite; }
@keyframes omGlow{0%,100%{filter:drop-shadow(0 0 20px rgba(184,134,11,0.8));}50%{filter:drop-shadow(0 0 40px rgba(212,168,65,1));}}
.c-divider { color:var(--gold); font-size:0.85rem; letter-spacing:5px; opacity:0.6; margin:12px 0; }
.c-title { font-family:'Tiro Devanagari Hindi',serif; font-size:clamp(2.2rem,6vw,3.5rem); color:#d4a841; line-height:1.2; text-shadow:0 0 30px rgba(184,134,11,0.5); margin:8px 0; letter-spacing:2px; }
.c-subtitle { font-family:'Tiro Devanagari Hindi',serif; font-size:clamp(0.85rem,2vw,1rem); color:rgba(212,168,65,0.75); line-height:2; font-style:italic; margin:18px 0 24px; }
.c-meta { font-family:'Crimson Pro',serif; font-size:0.8rem; color:rgba(184,134,11,0.55); letter-spacing:4px; text-transform:uppercase; margin-bottom:24px; }
.c-author-label { font-family:'Cinzel',serif; font-size:0.7rem; color:rgba(212,168,65,0.7); letter-spacing:5px; margin-top:24px; }
.c-author-name { font-family:'Cinzel',serif; font-size:1.1rem; color:#d4a841; letter-spacing:5px; text-shadow:0 0 15px rgba(184,134,11,0.4); }

/* Scroll hint arrow */
.scroll-hint {
  text-align:center; margin-top:20px;
  color:rgba(184,134,11,0.5);
  font-size:0.65rem; font-family:'Cinzel',serif;
  letter-spacing:3px; animation:scrollBounce 2s ease-in-out infinite;
}
@keyframes scrollBounce{0%,100%{transform:translateY(0);opacity:0.4;}50%{transform:translateY(6px);opacity:0.9;}}

/* ─── INTERIOR PAGES ─────────────────────────── */
.page-number-ribbon {
  position:absolute; left:-6px; top:24px;
  background: var(--crimson);
  color: #f5e8c0; font-family:'Cinzel',serif;
  font-size:0.55rem; letter-spacing:2px;
  padding:3px 10px 3px 14px;
  clip-path: polygon(0 0, 100% 0, 90% 50%, 100% 100%, 0 100%);
}

.page-head {
  text-align:center; margin-bottom:28px;
  padding-bottom:20px;
  border-bottom:1px solid rgba(184,134,11,0.25);
}
.ph-label { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:5px; color:var(--crimson); opacity:0.8; margin-bottom:6px; text-transform:uppercase; }
.ph-title { font-family:'Tiro Devanagari Hindi',serif; font-size:clamp(1.3rem,3.5vw,1.9rem); color:var(--ink); line-height:1.35; }
.ph-divider { color:var(--gold); font-size:0.75rem; letter-spacing:5px; opacity:0.5; margin-top:10px; }

/* Dialogue */
.sanvaad-header { text-align:center; font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:4px; color:var(--crimson); opacity:0.7; margin:14px 0; }
.dialogue { margin-bottom:13px; }
.guru-line, .shishya-line {
  display:flex; gap:12px; align-items:flex-start; margin-bottom:12px;
}
.shishya-line { flex-direction:row-reverse; }
.spk { font-size:1.2rem; flex-shrink:0; margin-top:3px; }
.bubble {
  max-width:85%; padding:10px 15px;
  font-size:0.97rem; line-height:1.85; color:var(--ink);
  border-radius:4px;
}
.guru-line .bubble {
  background:rgba(184,134,11,0.09); border-left:3px solid var(--gold); border-radius:0 6px 6px 0;
}
.shishya-line .bubble {
  background:rgba(122,21,21,0.07); border-right:3px solid var(--crimson); border-radius:6px 0 0 6px;
  text-align:right;
}

/* Teaching */
.shiksha-box {
  background:linear-gradient(135deg,rgba(184,134,11,0.1),rgba(184,134,11,0.03));
  border:1px solid rgba(184,134,11,0.22); border-radius:4px;
  padding:14px 20px; margin:20px 0 14px; position:relative;
}
.shiksha-box::before { content:'◈ मुख्य शिक्षा'; position:absolute; top:-10px; left:16px; background:var(--parchment); padding:0 8px; color:var(--gold); font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:3px; }
.shiksha-text { font-style:italic; color:var(--ink-light); font-size:0.96rem; line-height:1.75; }

/* Sutra */
.sutra-line {
  text-align:center; padding:8px 0 4px;
}
.sutra-line span { color:var(--gold); opacity:0.6; margin:0 8px; }
.sutra-quote { font-weight:600; font-style:italic; color:var(--ink); font-size:0.96rem; }

.section-end { text-align:center; color:var(--crimson); opacity:0.4; letter-spacing:8px; font-size:0.8rem; margin-top:20px; }

/* Dedication / special pages */
.special-inner { padding:60px 62px; text-align:center; }
.sp-title { font-family:'Tiro Devanagari Hindi',serif; font-size:1.7rem; color:var(--ink); margin-bottom:20px; }
.sp-om { color:var(--gold); font-size:1.1rem; letter-spacing:8px; opacity:0.6; margin-bottom:24px; }
.sp-body { font-size:1rem; line-height:2.3; color:var(--ink-light); font-style:italic; max-width:480px; margin:0 auto; }
.sp-author { text-align:right; margin-top:24px; font-style:italic; color:var(--ink-light); }

/* Story text */
.story-p { font-size:1rem; line-height:2.05; color:var(--ink); text-align:justify; margin-bottom:1.1em; text-indent:2em; }
.story-p.no-indent { text-indent:0; }
.story-p.dialogue { text-align:center; font-style:italic; text-indent:0; font-size:1.02rem; color:var(--ink-light); }

/* Khand divider page */
.khand-inner {
  padding:80px 60px; text-align:center;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:320px;
}
.khand-num { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:6px; color:var(--crimson); opacity:0.8; margin-bottom:14px; text-transform:uppercase; }
.khand-title { font-family:'Tiro Devanagari Hindi',serif; font-size:2rem; color:var(--ink); margin-bottom:18px; }
.khand-sep { color:var(--gold); letter-spacing:5px; opacity:0.5; font-size:0.9rem; margin:10px 0; }
.khand-quote { font-style:italic; color:var(--ink-light); font-size:0.96rem; line-height:1.85; max-width:360px; }

/* TOC */
.toc-inner { padding:50px 62px; }
.toc-h { font-family:'Tiro Devanagari Hindi',serif; font-size:1.7rem; color:var(--ink); text-align:center; margin-bottom:6px; }
.toc-om { color:var(--gold); letter-spacing:8px; opacity:0.5; font-size:0.9rem; text-align:center; margin-bottom:24px; }
.toc-k { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:4px; color:var(--crimson); border-bottom:1px solid rgba(122,21,21,0.2); padding-bottom:5px; margin:20px 0 10px; text-transform:uppercase; }
.toc-row { display:flex; align-items:baseline; gap:6px; padding:3px 0; }
.toc-n { font-family:'Crimson Pro',serif; font-size:0.78rem; color:var(--crimson); opacity:0.7; min-width:26px; }
.toc-dots { flex:1; border-bottom:1px dotted rgba(184,134,11,0.25); margin-bottom:3px; }
.toc-name { font-size:0.88rem; color:var(--ink-light); flex:3; }

/* Final page */
.final-inner {
  padding:70px 60px; text-align:center;
  display:flex; flex-direction:column; align-items:center;
}
.final-lines { font-style:italic; color:var(--ink-light); font-size:0.98rem; line-height:2.4; margin:20px 0; }
.final-contact { font-size:0.78rem; color:var(--ink-light); opacity:0.6; margin-top:8px; }

/* Back to top */
.back-top {
  position:fixed; bottom:30px; right:30px;
  background:rgba(14,7,2,0.9); border:1px solid rgba(184,134,11,0.4);
  color:var(--gold-light); font-family:'Cinzel',serif; font-size:0.65rem;
  letter-spacing:2px; padding:10px 16px; cursor:pointer;
  border-radius:2px; z-index:40;
  opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.back-top.show { opacity:1; pointer-events:all; }
.back-top:hover { background:rgba(184,134,11,0.15); }

@media(max-width:560px){
  .card-inner,.cover-inner,.toc-inner,.special-inner,.khand-inner,.final-inner { padding:36px 24px 44px; }
  .bubble { font-size:0.91rem; }
}
</style>
</head>
<body>

<!-- ════ LANDING ════════════════════════════════ -->
<div id="landing">
  <div class="stars-bg" id="starsEl"></div>
  <div class="book-glow"></div>

  <div class="book-scene" id="bookScene" onclick="openBook()">
    <div class="book-3d" id="book3d">
      <div class="book-spine-3d"><span class="spine-txt">चित्त विजय</span></div>
      <div class="book-pages-edge"></div>
      <div class="book-front">
        <div class="bf-om">🕉</div>
        <div class="bf-title">चित्त विजय</div>
        <div class="bf-line"></div>
        <div class="bf-sub">मन, जागरूकता और<br>आत्मज्ञान की यात्रा</div>
        <div class="bf-line"></div>
        <div class="bf-author">BIBEK PATRA</div>
      </div>
      <div class="book-back"></div>
    </div>
    <div class="click-hint">▼ &nbsp; खोलने के लिए क्लिक करें &nbsp; ▼</div>
  </div>

  <div class="landing-subtitle">गुरु-शिष्य महायात्रा · 200 अध्याय</div>
</div>

<!-- ════ READER ══════════════════════════════════ -->
<div id="reader">
  <div class="reader-topbar">
    <div class="topbar-title">चित्त विजय</div>
    <div class="topbar-progress-wrap"><div class="topbar-progress" id="topProgress"></div></div>
    <div class="topbar-pct" id="topPct">0%</div>
  </div>

  <div id="book-content"></div>
</div>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">▲ शीर्ष</button>

<script>
/* ── STARS ── */
const starsEl = document.getElementById('starsEl');
for(let i=0;i<70;i++){
  const s=document.createElement('div'); s.className='star-dot';
  const sz=1+Math.random()*2.5;

/* ── OPEN BOOK ── */
function openBook(){
  const landing=document.getElementById('landing');
  landing.classList.add('opening');
  buildReader();
  setTimeout(()=>{
    landing.classList.add('hidden');
    const reader=document.getElementById('reader');
    reader.classList.add('visible');
    document.body.style.background='#12080300';
    // Start scroll observer after DOM paints
    requestAnimationFrame(()=>{ initScrollObserver(); updateProgress(); });
  }, 1100);
}

/* ── SCROLL OBSERVER ── */
function initScrollObserver(){
  const sections=document.querySelectorAll('.page-section:not(.cover-section)');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
  },{threshold:0.07, rootMargin:'0px 0px -40px 0px'});
  sections.forEach(s=>obs.observe(s));
}

/* ── PROGRESS BAR ── */
function updateProgress(){
  const prog=document.getElementById('topProgress');
  const pct=document.getElementById('topPct');
  const bt=document.getElementById('backTop');
  function onScroll(){
    const h=document.documentElement;
    const pctVal=h.scrollTop/(h.scrollHeight-h.clientHeight)*100;
    prog.style.width=pctVal+'%';
    pct.textContent=Math.round(pctVal)+'%';
    bt.classList.toggle('show', h.scrollTop>400);
  }
  window.addEventListener('scroll',onScroll,{passive:true});
  onScroll();
}
</script>
